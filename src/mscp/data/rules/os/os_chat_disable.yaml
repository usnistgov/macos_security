id: os_chat_disable
title: Prevent the Usage of iMessage
discussion: |
  The iOS device _MUST_ be configured to disable iMessage on the device to prevent receiving malicious content via iMessage.
references:
  nist:
    cce:
      ios_26:
        - CCE-95606-0
      ios_18:
        - CCE-94520-4
      ios_17:
        - CCE-93473-7
    800-53r5:
      - AC-20
      - CM-7
      - CM-7(1)
  bsi:
    indigo:
      ios_26:
        - ANNEX K
      ios_18:
        - ANNEX K
      ios_17:
        - ANNEX K
  disa:
    cmmc:
      - AC.L1-B.1.III
      - AC.L2-3.1.20
      - CM.L2-3.4.6
      - CM.L2-3.4.7
platforms:
  iOS:
    '26.0':
      supervised: true
      benchmarks:
        - name: indigo_high
    '18.0':
      supervised: true
      benchmarks:
        - name: indigo_high
    '17.0':
      supervised: true
      benchmarks:
        - name: indigo_high
    introduced: '5.0'
tags:
  - 800-53r5_low
  - 800-53r5_moderate
  - 800-53r5_high
  - cmmc_lvl1
  - cmmc_lvl2
  - cmmc_lvl3
  - cnssi-1253_moderate
