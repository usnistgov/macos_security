id: os_visual_intelligence_summary
title: Disable Apple Intelligence Visual Intelligence Summary
discussion: |
  Apple Intelligence Features such as Visual Intelligence Summary that use off device AI _MUST_ be disabled.
references:
  nist:
    cce:
      ios_26:
        - CCE-95542-7
      ios_18:
        - CCE-94578-2
    800-53r5:
      - AC-20
      - AC-20(1)
      - CM-7
      - CM-7(1)
      - SC-7(10)
  disa:
    cmmc:
      - AC.L1-B.1.III
      - AC.L2-3.1.20
      - CM.L2-3.4.6
      - CM.L2-3.4.7
  bsi:
    indigo:
      ios_26:
        - ANNEX K
platforms:
  iOS:
    '26.0':
      supervised: true
      benchmarks:
        - name: indigo_base
        - name: indigo_high
    '18.0':
      supervised: true
    introduced: '18.3'
tags:
  - 800-53r5_low
  - 800-53r5_moderate
  - 800-53r5_high
  - cmmc_lvl1
  - cmmc_lvl2
  - cmmc_lvl3
  - cnssi-1253_moderate
  - cnssi-1253_low
  - cnssi-1253_high
mobileconfig_info:
  - PayloadType: com.apple.applicationaccess
    PayloadContent:
      - allowVisualIntelligenceSummary: false
ddm_info:
  declarationtype: com.apple.configuration.intelligence.settings
  ddm_key: AllowVisualIntelligenceSummary
  ddm_value: false
