      - CCI-000366
    disa_stig:
      ios_26:
        - AIOS-26-015000
      ios_18:
        - AIOS-18-015000
    sfr:
      - 'FMT_SMF_EXT.1.1 #3'
    cmmc:
      - CM.L2-3.4.9
  bsi:
    indigo:
      ios_26:
        - ANNEX K
      ios_18:
        - ANNEX K
  bzk:
    bio:
      - 8.27
platforms:
