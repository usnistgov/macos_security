id: os_siri_service_disable
title: Disable Siri service
discussion: |
  The built-in Siri service _MUST_ be disabled to prevent organizational data from being synchronized to Apple servers.

  Apple's Siri service does not provide an organization with sufficient control over the storage and access of data; therefore, automated synchronization _MUST_ be controlled by an organization-approved service.
