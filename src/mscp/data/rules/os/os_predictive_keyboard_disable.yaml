id: os_predictive_keyboard_disable
title: Disable the Use of Predictable Keyboards
discussion: |
  The device _MUST_ be configured that the usage of the predictable keyboard feature is not possible.
references:
  nist:
    cce:
      ios_26:
        - CCE-95677-1
      ios_18:
        - CCE-94543-6
      ios_17:
        - CCE-93491-9
  bsi:
    indigo:
      ios_26:
        - ANNEX K
      ios_18:
        - ANNEX K
      ios_17:
        - ANNEX K
platforms:
  iOS:
    '26.0':
      supervised: true
      benchmarks:
        - name: indigo_base
        - name: indigo_high
    '18.0':
      supervised: true
      benchmarks:
        - name: indigo_base
        - name: indigo_high
    '17.0':
      supervised: true
      benchmarks:
        - name: indigo_base
        - name: indigo_high
    introduced: 8.1.3
mobileconfig_info:
  - PayloadType: com.apple.applicationaccess
    PayloadContent:
      - allowPredictiveKeyboard: false
