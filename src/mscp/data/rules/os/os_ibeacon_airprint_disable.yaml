---
id: os_ibeacon_airprint_disable
title: Disable Discovery of AirPrint Printers using iBeacons
discussion: |
  iBeacon discovery _MUST_ be disabled to prevent AirPrint Bluebooth beacons from being potentially exploited for network phishing.
references:
  nist:
    cce:
      ios_26:
        - CCE-95661-5
      ios_18:
        - CCE-94529-5
    800-53r5:
      - CM-6
  disa:
    cci:
      - CCI-000366
    disa_stig:
      ios_26:
        - AIOS-26-016700
      ios_18:
        - AIOS-18-016700
    sfr:
      - 'FMT_MOF_EXT.1.2 #47'
    cmmc:
      - AU.L2-3.3.3
      - CM.L2-3.4.1
      - CM.L2-3.4.2
platforms:
  iOS:
    '27.0': {}
    '26.0':
      supervised: true
      benchmarks:
        - name: ios_stig
    '18.0':
      supervised: true
      benchmarks:
        - name: ios_stig
    introduced: '11.0'
tags:
  - cmmc_lvl2
  - cmmc_lvl3
  - 800-53r5_low
  - 800-53r5_moderate
  - 800-53r5_high
mobileconfig_info:
  - PayloadType: com.apple.applicationaccess
    PayloadContent:
      - allowAirPrintiBeaconDiscovery: false
