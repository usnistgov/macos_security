id: os_bluetooth_modification_disable
title: Bluetooth Status Modification Disabled
discussion: |
  The ability to enable or disable Bluetooth _MUST_ be disabled.
references:
  nist:
    cce:
      ios_26:
        - CCE-95655-7
    800-53r5:
      - CM-7
      - CM-7(1)
      - SC-7(10)
  disa:
    cci:
      - CCI-000366
    disa_stig:
      ios_26:
        - AIOS-26-018200
    sfr:
      - 'FMT_SMF.1.1 #47'
    cmmc:
      - CM.L2-3.4.6
      - CM.L2-3.4.7
platforms:
  iOS:
    '26.0':
      supervised: false
      benchmarks:
        - name: ios_stig
    introduced: '11.0'
tags:
  - 800-53r5_low
  - 800-53r5_moderate
  - 800-53r5_high
  - cmmc_lvl2
  - cmmc_lvl3
  - cnssi-1253_moderate
  - cnssi-1253_low
  - cnssi-1253_high
mobileconfig_info:
  - PayloadType: com.apple.applicationaccess
    PayloadContent:
      - allowBluetoothModification: false
