---
id: system_settings_siri_AI_disable
title: Disable Siri AI
discussion: |
  Support for Siri and Siri AI is non-essential and _MUST_ be disabled to prevent organizational data from being synchronized to Apple servers. 

  Apple's Siri service does not provide an organization with enough control over the storage and access of data, and, therefore, automated synchronization _MUST_ be controlled by an organization approved service. Apple Intelligence features such as Siri AI that use off device AI _MUST_ be disabled.

  The information system _MUST_ be configured to provide only essential capabilities.
