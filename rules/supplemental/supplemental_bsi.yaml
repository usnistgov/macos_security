id: supplemental_bsi
title: "BSI Supplemental"
discussion: |
  These controls require additional organizational and operational considerations for the environment in accordance with the BSI  IT-Grundschutz module SYS.2.4 Clients unter macOS.

  [cols="25%h, 75%a"]
  |===
  |Account management
  |Define the separation of standard user accounts and administrative accounts. Administrative accounts must only be used for administrative  activities.

  |FileVault recovery
  |Define secure storage, access permissions and recovery procedures for FileVault recovery keys.

  |Apple ID and iCloud
  |Define whether Apple IDs and iCloud services are permitted. Sensitive data must not be stored or synchronized in an uncontrolled manner.

  |Application installation
  |Define approved applications, prohibited applications and the software approval process.

  |External media
  |Define permitted removable-media types, malware scanning procedures, encryption requirements and exception handling.

  |Update management
  |Define testing, deployment deadlines, permitted deferrals and exception handling for security updates.

  |Logging
  |Define central log collection, retention periods, monitoring and alerting.

  |Device retirement
  |Define secure deletion, MDM removal and device-retirement procedures.
  |===

