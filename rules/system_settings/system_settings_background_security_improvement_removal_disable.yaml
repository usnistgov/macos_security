    - N/A
  800-171r3:
    - N/A
  cis:
    benchmark:
      - N/A
    controls v8:
      - N/A
  bio:
    - 8.08.01
macOS:
  - '26.0'
tags:
  - ddm
  - nlmapgov_plus
mobileconfig: false
mobileconfig_info:
ddm_info:
  declarationtype: com.apple.configuration.softwareupdate.settings
  ddm_key: RapidSecurityResponse
  ddm_value: 
    EnableRollback: false
