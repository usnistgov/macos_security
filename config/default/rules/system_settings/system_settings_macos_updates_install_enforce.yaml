id: system_settings_macos_updates_install_enforce
title: Enforce macOS Updates are Automatically Installed using DDM.
discussion: |
  Software Update _MUST_ be configured to enforce automatic installation of macOS updates and that the user cannot modify the setting within System Settings.
platforms:
  macOS:
    '26.0': {}
    enforcement_info:
      check:
        shell: /usr/bin/plutil -convert json /var/db/softwareupdate/SoftwareUpdateDDMStatePersistence.plist -o - | /usr/bin/jq --raw-output .'SUCorePersistedStatePolicyFields.SUCoreDDMDeclarationGlobalSettings.automaticallyInstallOSUpdates'
        result:
          integer: 1
      fix:
        additional_info: This is implemented by Declarative Device Management (DDM).
tags:
  - nlmapgov_base
  - nlmapgov_plus
ddm_info:
  declarationtype: com.apple.configuration.softwareupdate.settings
  ddm_key: AutomaticActions
  ddm_value:
    InstallOSUpdates: AlwaysOn
